server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: event_service_route
          uri: lb://event-service
          predicates:
#           - Path=/events/** , /admin/events/**, /*/events/**, /*/comments/**, /users/*/events/**
           - Path=/events/**, /admin/events/**, /*/events/**, /*/comments, /*/comments/**, /comments/**, /users/*/events/**

        - id: user_service_route
          uri: lb://user-service
          predicates:
           - Path=/admin/users/**

        - id: extra_service_route
          uri: lb://category-service
          predicates:
           - Path=/compilations/**, /categories/**, /admin/categories/**, /admin/compilations/**

        - id: request_service_route
          uri: lb://request-service
          predicates:
           - Path=/users/{userId}/requests/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route: DEBUG