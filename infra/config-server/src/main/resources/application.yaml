server:
  port: 0

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations:
            - classpath:/config/{application}
            - classpath:/config/core/{application}
            - classpath:/config/infra/{application}
            - classpath:/config/telemetry/{application}

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${random.value}
    non-secure-port-enabled: true